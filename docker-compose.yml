services:
  web:
    build: .
    volumes:
      - .:/app
      - ./static:/app/static
      - ./media:/app/media
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DEBUG=0
      - ALLOWED_HOSTS=ai.abutolib.uz,127.0.0.1,localhost
      # DIQQAT: Portni 1080 ga o'zgartirdik (standart Warp porti)
      - HTTP_PROXY=socks5://socks5:1080
      - HTTPS_PROXY=socks5://socks5:1080
    depends_on:
      - socks5
    networks:
      - abutolib_net
    restart: always

  socks5:
    image: monius/docker-warp-socks:latest
    privileged: true
    # Ba'zi versiyalarda portni aniq ko'rsatish foyda beradi
    environment:
      - PORT=1080 
    networks:
      - abutolib_net
    restart: always

networks:
  abutolib_net:
    driver: bridge