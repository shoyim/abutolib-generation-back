version: '3.9'

services:
  web:
    build: .
    volumes:
      - .:/app
      - ./static:/app/static
      - ./media:/app/media
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DEBUG=1
      - ALLOWED_HOSTS=ai.abutolib.uz,127.0.0.1,localhost
    command: python manage.py runserver 0.0.0.0:8000
    networks:
      - abutolib_net
    restart: always

networks:
  abutolib_net:
    driver: bridge