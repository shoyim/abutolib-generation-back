version: '3.9'

services:
  web:
    build: .
    volumes:
      - .:/app
      - ./static:/app/static
      - ./media:/app/media
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DEBUG=0
      - ALLOWED_HOSTS=ai.abutolib.uz,127.0.0.1,localhost
      - HTTP_PROXY=socks5h://socks5:1080
      - HTTPS_PROXY=socks5h://socks5:1080
      - NO_PROXY=localhost,127.0.0.1
    depends_on:
      - socks5
    networks:
      - abutolib_net
    restart: always

  socks5:
    image: monius/docker-warp-socks:latest
    privileged: true
    environment:
      - PORT=1080
    networks:
      - abutolib_net
    restart: always

networks:
  abutolib_net:
    driver: bridge