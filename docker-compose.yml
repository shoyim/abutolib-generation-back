version: '3.9'

services:
  web:
    build: .
    volumes:
      - .:/app
      - ./static:/app/static
      - ./media:/app/media
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DEBUG=0
      - ALLOWED_HOSTS=ai.abutolib.uz,127.0.0.1,localhost
      # Gemini uchun proksi (socks5h DNS muammolarini yechadi)
      - HTTP_PROXY=socks5h://socks5:1080
      - HTTPS_PROXY=socks5h://socks5:1080
    depends_on:
      - socks5
      - ollama
    networks:
      - abutolib_net
    restart: always

  socks5:
    image: monius/docker-warp-socks:latest
    privileged: true
    environment:
      - PORT=1080
    networks:
      - abutolib_net
    restart: always

  ollama:
    # Rasmiy va barqaror obrazga o'zgartirildi
    image: ollama/ollama:latest
    container_name: ollama
    ports:
      - "11434:11434"
    volumes:
      # Modellar server o'chsa ham saqlanib qolishi uchun
      - ollama_storage:/root/.ollama
    networks:
      - abutolib_net
    restart: unless-stopped

networks:
  abutolib_net:
    driver: bridge

# Yuklangan modellarni saqlash uchun disk maydoni
volumes:
  ollama_storage: